name: Focus on CLBlast (The "No-Nonsense" Way)

on:
  workflow_dispatch:

jobs:
  build-clblast:
    runs-on: windows-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          repository: Kontomoka5932/whisper-1.6.2
          ref: master

      - name: Install vcpkg and CLBlast
        shell: pwsh
        run: |
          $V_PATH = Join-Path $env:GITHUB_WORKSPACE "vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $V_PATH
          
          # Переходим в папку и запускаем через .\
          Push-Location $V_PATH
          Write-Host "Current Location: $(Get-Location)"
          Write-Host "Files in folder: $(Get-ChildItem | Select-Object -First 5)"
          .\vcpkg.exe install clblast:x64-windows
          Pop-Location
          
          echo "$V_PATH" >> $env:VCPKG_DIR
          echo "$V_PATH/scripts/buildsystems/vcpkg.cmake" >> $env:VCPKG_TOOLCHAIN

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmake_cmd = "cmake -S . -B build -A x64 -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DGGML_CLBLAST=ON -DWHISPER_CLBLAST=ON -DGGML_VULKAN=OFF -DGGML_CUDA=OFF -DWHISPER_CUDA=OFF -DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_TOOLCHAIN"
          Write-Host "Executing: $cmake_cmd"
          Invoke-Expression $cmake_cmd

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Collect Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifact -Force
          Copy-Item build/bin/Release/*.exe artifact/ -ErrorAction SilentlyContinue
          Copy-Item build/bin/Release/*.dll artifact/ -ErrorAction SilentlyContinue

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-clblast-only
          path: artifact/

name: Build Windows CLBlast (The Pro Way)

on:
  workflow_dispatch:

jobs:
  windows-clblast:
    runs-on: windows-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          repository: Kontomoka5932/whisper-1.6.2
          ref: master

      - name: Install OpenCL (Required for CLBlast)
        shell: pwsh
        run: |
          # CLBlast требует OpenCL, поставим его быстро через vcpkg, так как это база
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\vcpkg.exe install opencl:x64-windows
          echo "$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $env:VCPKG_TOOLCHAIN

      - name: Fetch CLBlast Prebuilt Binaries
        shell: pwsh
        run: |
          # Используем версию 1.6.1, как в оригинальном build-vulkan-windows.yml
          $VERSION = "1.6.1"
          $URL = "https://github.com/CNugteren/CLBlast/releases/download/$VERSION/CLBlast-$VERSION-windows-x64.zip"
          
          Write-Host "Downloading CLBlast $VERSION..."
          C:/msys64/usr/bin/wget.exe -qO clblast.zip $URL
          
          Write-Host "Extracting..."
          7z x clblast.zip -oCLBlast_Folder -y
          
          # Распаковываем внутренний 7z, если он есть (как в оригинале)
          if (Test-Path "CLBlast_Folder/CLBlast-$VERSION-windows-x64.7z") {
            7z x "CLBlast_Folder/CLBlast-$VERSION-windows-x64.7z" -oCLBlast_Folder -y
          }
          
          # Устанавливаем путь к CMake конфигам CLBlast
          $CL_DIR = "$PWD/CLBlast_Folder/CLBlast-$VERSION-windows-x64/lib/cmake/CLBlast"
          echo "CLBlast_DIR=$CL_DIR" >> $env:GITHUB_ENV
          
          # Также нам понадобится сама DLL, положим её в корень для удобства
          Copy-Item "CLBlast_Folder/CLBlast-$VERSION-windows-x64/bin/clblast.dll" "$PWD/clblast.dll"

      - name: Configure CMake
        shell: pwsh
        run: |
          # Собираем всё вместе: готовый CLBlast + vcpkg для OpenCL
          $cmake_cmd = "cmake -S . -B build -A x64 " +
                       "-DCMAKE_BUILD_TYPE=Release " +
                       "-DBUILD_SHARED_LIBS=ON " +
                       "-DGGML_CLBLAST=ON " +
                       "-DWHISPER_CLBLAST=ON " +
                       "-DGGML_VULKAN=OFF " +
                       "-DGGML_CUDA=OFF " +
                       "-DWHISPER_CUDA=OFF " +
                       "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_TOOLCHAIN " +
                       "-DCLBlast_DIR=$env:CLBlast_DIR"
          
          Write-Host "Executing: $cmake_cmd"
          Invoke-Expression $cmake_cmd

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Collect Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifact -Force
          Copy-Item build/bin/Release/*.exe artifact/ -ErrorAction SilentlyContinue
          Copy-Item build/bin/Release/*.dll artifact/ -ErrorAction SilentlyContinue
          # Копируем скачанную clblast.dll, если она не попала в бинарники
          if (Test-Path "clblast.dll") { Copy-Item "clblast.dll" artifact/ }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-clblast-final
          path: artifact/

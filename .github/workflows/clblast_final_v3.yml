name: Build Windows CLBlast (The Real Way)

on:
  workflow_dispatch:

jobs:
  windows-clblast:
    runs-on: windows-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          repository: Kontomoka5932/whisper-1.6.2
          ref: master

      - name: Install OpenCL via vcpkg
        shell: pwsh
        run: |
          # Используем vcpkg, который уже есть в PATH на windows-latest
          vcpkg install opencl:x64-windows

      - name: Fetch CLBlast and set CLBlast_DIR
        shell: pwsh
        run: |
          $VERSION = "1.6.1"
          $URL = "https://github.com/CNugteren/CLBlast/releases/download/$VERSION/CLBlast-$VERSION-windows-x64.zip"
          
          Write-Host "Downloading CLBlast $VERSION..."
          C:/msys64/usr/bin/wget.exe -qO clblast.zip $URL
          
          Write-Host "Extracting..."
          7z x clblast.zip -y
          
          # Распаковываем внутренний 7z, если он есть (как в оригинале)
          if (Test-Path "CLBlast-$VERSION-windows-x64.7z") {
            7z x "CLBlast-$VERSION-windows-x64.7z" -y
          }
          
          # Устанавливаем путь к CMake конфигам (как в твоем конфиге!)
          $CL_DIR = "$env:GITHUB_WORKSPACE/CLBlast-$VERSION-windows-x64/lib/cmake/CLBlast"
          echo "CLBlast_DIR=$CL_DIR" >> $env:GITHUB_ENV
          
          # Копируем DLL в корень для удобства
          Copy-Item "CLBlast-$VERSION-windows-x64/bin/clblast.dll" "$env:GITHUB_WORKSPACE/clblast.dll"

      - name: Configure CMake
        shell: pwsh
        run: |
          # Собираем команду, используя переменные окружения
          $cmake_cmd = "cmake -S . -B build -A x64 " +
                       "-DCMAKE_BUILD_TYPE=Release " +
                       "-DBUILD_SHARED_LIBS=ON " +
                       "-DGGML_CLBLAST=ON " +
                       "-DWHISPER_CLBLAST=ON " +
                       "-DGGML_VULKAN=OFF " +
                       "-DGGML_CUDA=OFF " +
                       "-DWHISPER_CUDA=OFF " +
                       "-DCLBlast_DIR=$env:CLBlast_DIR"
          
          Write-Host "Executing: $cmake_cmd"
          Invoke-Expression $cmake_cmd

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Collect Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifact -Force
          Copy-Item build/bin/Release/*.exe artifact/ -ErrorAction SilentlyContinue
          Copy-Item build/bin/Release/*.dll artifact/ -ErrorAction SilentlyContinue
          if (Test-Path "clblast.dll") { Copy-Item "clblast.dll" artifact/ }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-clblast-v3
          path: artifact/

name: Build Windows CLBlast + Stream (The Ultimate Fix)

on:
  workflow_dispatch:

jobs:
  windows-clblast:
    runs-on: windows-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          repository: Kontomoka5932/whisper-1.6.2
          ref: master

      - name: Install OpenCL via vcpkg
        shell: pwsh
        run: |
          vcpkg install opencl:x64-windows

      - name: Fetch SDL2 (Required for stream.exe)
        shell: pwsh
        run: |
          $S2VER = "2.28.5"
          $URL = "https://github.com/libsdl-org/SDL/releases/download/release-$S2VER/SDL2-devel-$S2VER-VC.zip"
          
          Write-Host "Downloading SDL2..."
          C:/msys64/usr/bin/wget.exe -qO sdl2.zip $URL
          
          Write-Host "Extracting..."
          7z x sdl2.zip -y
          
          # РЕКУРСИВНЫЙ ПОИСК SDL2.dll
          $sdl_dll = Get-ChildItem -Path "." -Filter "SDL2.dll" -Recurse | Select-Object -First 1
          if ($sdl_dll) {
            Write-Host "Found SDL2.dll at: $($sdl_dll.FullName)"
            Copy-Item $sdl_dll.FullName "$env:GITHUB_WORKSPACE/SDL2.dll"
            
            # Находим папку с cmake конфигами SDL2
            $sdl_cmake = Get-ChildItem -Path "." -Filter "SDL2Config.cmake" -Recurse | Select-Object -First 1
            if ($sdl_cmake) {
              $SDL_DIR = $sdl_cmake.DirectoryName
              echo "SDL2_DIR=$SDL_DIR" >> $env:GITHUB_ENV
              
              # ВАЖНО: Находим родительскую папку для CMAKE_PREFIX_PATH
              # Нам нужна папка, которая содержит 'lib' или 'include'
              $SDL_ROOT = $sdl_cmake.DirectoryName.Replace("lib/cmake/SDL2", "").Replace("cmake", "").TrimEnd('/')
              # Если путь все еще слишком глубокий, берем уровень выше
              if ($SDL_ROOT.EndsWith("/")) { $SDL_ROOT = $SDL_ROOT.Substring(0, $SDL_ROOT.Length - 1) }
              
              echo "SDL2_ROOT=$SDL_ROOT" >> $env:GITHUB_ENV
              Write-Host "Set SDL2_DIR to: $SDL_DIR"
              Write-Host "Set SDL2_ROOT to: $SDL_ROOT"
            }
          } else {
            Write-Error "Could not find SDL2.dll anywhere!"
            exit 1
          }

      - name: Fetch CLBlast and set CLBlast_DIR
        shell: pwsh
        run: |
          $VERSION = "1.6.1"
          $URL = "https://github.com/CNugteren/CLBlast/releases/download/$VERSION/CLBlast-$VERSION-windows-x64.zip"
          
          Write-Host "Downloading CLBlast $VERSION..."
          C:/msys64/usr/bin/wget.exe -qO clblast.zip $URL
          
          Write-Host "Extracting..."
          7z x clblast.zip -y
          
          if (Test-Path "CLBlast-$VERSION-windows-x64.7z") {
            7z x "CLBlast-$VERSION-windows-x64.7z" -y
          }
          
          $cmake_path = Get-ChildItem -Path "." -Filter "CLBlastConfig.cmake" -Recurse | Select-Object -First 1
          if ($cmake_path) {
            $CL_DIR = $cmake_path.DirectoryName
            echo "CLBlast_DIR=$CL_DIR" >> $env:GITHUB_ENV
          }

          $dll_file = Get-ChildItem -Path "." -Filter "clblast.dll" -Recurse | Select-Object -First 1
          if ($dll_file) {
            Copy-Item $dll_file.FullName "$env:GITHUB_WORKSPACE/clblast.dll"
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          # Добавляем CMAKE_PREFIX_PATH, чтобы CMake точно нашел SDL2
          $cmake_cmd = "cmake -S . -B build -A x64 " +
                       "-DCMAKE_BUILD_TYPE=Release " +
                       "-DBUILD_SHARED_LIBS=ON " +
                       "-DGGML_CLBLAST=ON " +
                       "-DWHISPER_CLBLAST=ON " +
                       "-DWHISPER_SDL2=ON " +
                       "-DGGML_VULKAN=OFF " +
                       "-DGGML_CUDA=OFF " +
                       "-DWHISPER_CUDA=OFF " +
                       "-DCLBlast_DIR=$env:CLBlast_DIR " +
                       "-DSDL2_DIR=$env:SDL2_DIR " +
                       "-DCMAKE_PREFIX_PATH=`"$env:SDL2_ROOT`;$env:CLBlast_DIR`""
          
          Write-Host "Executing: $cmake_cmd"
          Invoke-Expression $cmake_cmd

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Collect Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifact -Force
          Copy-Item build/bin/Release/*.exe artifact/ -ErrorAction SilentlyContinue
          Copy-Item build/bin/Release/*.dll artifact/ -ErrorAction SilentlyContinue
          if (Test-Path "clblast.dll") { Copy-Item "clblast.dll" artifact/ }
          if (Test-Path "SDL2.dll") { Copy-Item "SDL2.dll" artifact/ }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-clblast-complete-v7
          path: artifact/

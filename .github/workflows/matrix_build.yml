name: Ultimate Windows Build Matrix

on:
  workflow_dispatch: # Та самая кнопка запуска!

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Win-x64-Vulkan"
            arch: x64
            backend: "VULKAN"
            extra_flags: "-DGGML_VULKAN=ON -DGGML_CUDA=OFF -DWHISPER_CLBLAST=OFF"
          
          - name: "Win-x64-CLBlast"
            arch: x64
            backend: "CLBLAST"
            extra_flags: "-DGGML_CLBLAST=ON -DGGML_VULKAN=OFF -DGGML_CUDA=OFF -DWHISPER_CLBLAST=ON"
            use_vcpkg: true

          - name: "Win-x64-CUDA"
            arch: x64
            backend: "CUDA"
            extra_flags: "-DGGML_CUDA=ON -DGGML_VULKAN=OFF -DWHISPER_CLBLAST=OFF"

          - name: "Win-x86-CPU"
            arch: x86
            backend: "CPU"
            extra_flags: "-DGGML_VULKAN=OFF -DGGML_CUDA=OFF -DWHISPER_CLBLAST=OFF"

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          repository: Kontomoka5932/whisper-1.6.2
          ref: master

      # Установка vcpkg только если нужен CLBlast
      - name: Setup vcpkg (for CLBlast)
        if: matrix.use_vcpkg == 'true'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          echo "VCPKG_ROOT=$PWD/vcpkg" >> $env:GITHUB_ENV
          echo "$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_PATH
          "$PWD/vcpkg/vcpkg" install clblast:x64-windows

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmake_cmd = "cmake -S . -B build -A ${{ matrix.arch }} -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON ${{ matrix.extra_flags }}"
          if ('${{ matrix.use_vcpkg }}' -eq 'true') {
            $cmake_cmd += " -DCMAKE_TOOLCHAIN_FILE=`"$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake`""
          }
          Invoke-Expression $cmake_cmd

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Collect Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifact -Force
          Copy-Item build/bin/Release/*.exe artifact/
          Copy-Item build/bin/Release/*.dll artifact/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: artifact/

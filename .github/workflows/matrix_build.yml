name: Ultimate Windows Build Matrix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Win-x64-Vulkan"
            arch: x64
            extra_flags: "-DGGML_VULKAN=ON -DGGML_CUDA=OFF -DWHISPER_CLBLAST=OFF -DWHISPER_CUDA=OFF"
          
          - name: "Win-x64-CLBlast"
            arch: x64
            extra_flags: "-DGGML_CLBLAST=ON -DGGML_VULKAN=OFF -DGGML_CUDA=OFF -DWHISPER_CLBLAST=ON -DWHISPER_CUDA=OFF"
            use_vcpkg: true

          - name: "Win-x64-CUDA"
            arch: x64
            extra_flags: "-DGGML_CUDA=ON -DGGML_VULKAN=OFF -DWHISPER_CLBLAST=OFF -DWHISPER_CUDA=ON"

          - name: "Win-x86-CPU"
            arch: Win32
            extra_flags: "-DGGML_VULKAN=OFF -DGGML_CUDA=OFF -DWHISPER_CLBLAST=OFF -DWHISPER_CUDA=OFF"

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          repository: Kontomoka5932/whisper-1.6.2
          ref: master

      - name: Setup vcpkg and CLBlast
        if: matrix.use_vcpkg == 'true'
        shell: pwsh
        run: |
          $V_PATH = "$env:GITHUB_WORKSPACE/vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $V_PATH
          "$V_PATH/vcpkg" install clblast:x64-windows
          echo "$V_PATH" >> $env:VCPKG_ROOT_LOCAL
          echo "$V_PATH/scripts/buildsystems/vcpkg.cmake" >> $env:VCPKG_TOOLCHAIN_LOCAL

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmake_cmd = "cmake -S . -B build -A ${{ matrix.arch }} -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON ${{ matrix.extra_flags }}"
          if ('${{ matrix.use_vcpkg }}' -eq 'true') {
            $cmake_cmd += " -DCMAKE_TOOLCHAIN_FILE=`"$env:VCPKG_TOOLCHAIN_LOCAL`""
          }
          Write-Host "Executing: $cmake_cmd"
          Invoke-Expression $cmake_cmd

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Collect Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifact -Force
          Copy-Item build/bin/Release/*.exe artifact/ -ErrorAction SilentlyContinue
          Copy-Item build/bin/Release/*.dll artifact/ -ErrorAction SilentlyContinue

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: artifact/
